# ============ 资讯来源（多源、多类别）============
# category 用于情报中心分区：AI科技 / 财经 / 中文科技 / 综合资讯 / 出海创业
# domain：business（业务相关）/ life（生活相关）
#
# 说明：
# - 这里是「精选基线源」。你可以在设置页继续增删，或一键导入 OPML
#   （Karpathy 推荐的 92 个 HN 高赞博客、BestBlogs 的 375 个中文公众号等）。
# - X / Twitter 监控不在这里配置，统一在设置页「X 监控」里管理
#   （settings -> x_monitor：可填 @handle 走 RSSHub，或直接粘贴 rss.app 生成的 feed）。

