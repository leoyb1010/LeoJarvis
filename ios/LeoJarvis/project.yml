name: LeoJarvis
options:
  bundleIdPrefix: com.leo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
targets:
  LeoJarvis:
    type: application
    platform: iOS
    sources:
      - LeoJarvis
    dependencies:
      - framework: Vendor/whisper.xcframework
        embed: true
        codeSign: true
    info:
      path: LeoJarvis/Info.plist
      properties:
        CFBundleDisplayName: LeoJarvis
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchStoryboardName: LaunchScreen
        NSMicrophoneUsageDescription: "用于 LeoJarvis 语音输入和 Whisper 转写。"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leo.leojarvis.ios
        PRODUCT_NAME: LeoJarvis
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "21"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
  LeoJarvisTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LeoJarvisTests
    dependencies:
      - target: LeoJarvis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leo.leojarvis.ios.tests
        GENERATE_INFOPLIST_FILE: YES
